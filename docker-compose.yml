# ══════════════════════════════════════════════════════════════════════════════
# Docker Compose — AI-Powered Research Paper Analyzer
# Full-stack: Frontend (Nginx) + Backend (FastAPI) + Postgres + Redis
# ══════════════════════════════════════════════════════════════════════════════

services:
  # ── React Frontend (Nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: paper-analyzer-frontend:latest
    container_name: paper-analyzer-frontend
    ports:
      - "3000:3000"
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped

  # ── FastAPI Backend (API Gateway) ─────────────────────────────────────────
  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: paper-analyzer-api:latest
    container_name: paper-analyzer-api
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data
    environment:
      - REDIS_URL=redis://db-redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@db-postgres:5432/paper_analyzer
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db-redis:
        condition: service_healthy
      db-postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery AI Worker (Background Pipeline) ────────────────────────────────
  # Runs YOLO DLA → LangExtract → Pandas → Cognee asynchronously
  ai-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: paper-analyzer-worker:latest
    container_name: paper-analyzer-worker
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - app_data:/app/data
    environment:
      - REDIS_URL=redis://db-redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@db-postgres:5432/paper_analyzer
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db-redis:
        condition: service_healthy
      db-postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL (Relational DB) ────────────────────────────────────────────
  db-postgres:
    image: postgres:15-alpine
    container_name: paper-analyzer-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=paper_analyzer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (Celery Message Broker) ─────────────────────────────────────────
  db-redis:
    image: redis:7-alpine
    container_name: paper-analyzer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  app_data:
  redis_data:
  postgres_data:
